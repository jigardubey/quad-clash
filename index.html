<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>QUAD CLASH</title>
    <link rel="stylesheet" href="style.css">
    <!-- Game chalane ke liye Phaser Engine include kiya -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>

    <!-- Main Menu -->
    <div id="main-menu">
        <h1>🎮 QUAD CLASH 🎮</h1>
        <p>Doston ke saath khelne ke liye game chuno:</p>
        
        <div class="game-list">
            <!-- Game 1: Tank Fight -->
            <div class="game-card" onclick="openLobby('tank-game')">
                <div class="game-icon">🚀</div>
                <h3>Tank Fight</h3>
            </div>
            
            <!-- Game 2: Car Race -->
            <div class="game-card" onclick="openLobby('race-game')">
                <div class="game-icon">🏎️</div>
                <h3>Car Race</h3>
            </div>
        </div>
    </div>

    <!-- Lobby Screen -->
    <div id="lobby-screen" class="hidden">
        <h2 id="selected-game-title">Game Lobby</h2>
        
        <div class="lobby-actions">
            <button onclick="createRoom()">➕ Create Room</button>
            <div class="join-box">
                <input type="text" id="room-code-input" placeholder="Enter Room Code">
                <button onclick="joinRoom()">🔌 Join Room</button>
            </div>
            <!-- Testing ke liye bina room ke direct start karne ka button -->
            <button id="start-game-btn" onclick="startTankGame()">🎮 Start Offline Test</button>
            <button class="back-btn" onclick="backToMenu()">⬅️ Back</button>
        </div>
    </div>

    <!-- Yahan hamara game canvas screen dikhega -->
    <div id="game-container"></div>

    <script src="main.js"></script>
</body>
</html>
